name: Sync World Cup Scores

on:
  schedule:
    # Every 5 minutes during World Cup (Jun 11 – Jul 19, 2026)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync scores
        run: |
          curl -s -X POST "${{ secrets.SYNC_URL }}" \
            -H "Authorization: Bearer ${{ secrets.SYNC_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30
